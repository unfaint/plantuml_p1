services:
  plantuml:
    image: eclipse-temurin:21-jre-alpine
    volumes:
      - ../picoweb_demo/plantuml-1.2026.2.jar:/plantuml.jar:ro
    command: ["java", "-jar", "/plantuml.jar", "-picoweb:8080"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:8080/plantuml/svg/~h407374617274756d6c0a40656e64756d6c"]
      start_period: 10s
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: phase1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d phase1"]
      start_period: 5s
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 5s
      interval: 5s
      timeout: 3s
      retries: 10

  hocuspocus:
    build:
      context: hocuspocus
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/phase1
      CLERK_SECRET_KEY: "${CLERK_SECRET_KEY}"
    ports:
      - "1234:1234"

  app:
    build:
      context: .
      args:
        VITE_CLERK_PUBLISHABLE_KEY: "${VITE_CLERK_PUBLISHABLE_KEY}"
    ports:
      - "3000:3000"
    depends_on:
      plantuml:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      hocuspocus:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/phase1
      REDIS_URL: redis://redis:6379
      PLANTUML_URL: http://plantuml:8080
      CLERK_SECRET_KEY: "${CLERK_SECRET_KEY}"
      PORT: "3000"

volumes:
  pgdata:
